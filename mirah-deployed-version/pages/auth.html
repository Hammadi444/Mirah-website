<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Auth — Mirah Tools</title>
  <link rel="icon" type="image/png" href="../assets/BymflQPK.png">
  
  <!-- CSS Links -->

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&family=Sometype+Mono:wght@500&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="../assets/CzyAB39g.js"></script>
  <script type="module" crossorigin src="https://esm.sh/@supabase/supabase-js@2"></script>
  <script type="module" crossorigin src="../assets/CbFKLNFx.js"></script>
  <script type="module" crossorigin src="../assets/DsVqtJDr.js"></script>
  <script type="module" crossorigin src="https://esm.sh/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" crossorigin href="../assets/Bnc69Vgf.css">
  <link rel="stylesheet" crossorigin href="../assets/RFikbGVC.css">
  <link rel="stylesheet" crossorigin href="../assets/D2PASzmO.css">
</head>

<body class="authPage">

  <!-- Minimal Header -->
  <header class="authTop">
    <a class="authTop__brand" href="../index.html">
      <img class="authTop__logo" src="../assets/BPLGmLBC.jpg" alt="Mirah" />
      <span class="authTop__name">MIRAH</span>
    </a>
    <a class="authTop__back" href="../index.html">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5m7-7l-7 7 7 7"/></svg>
      Back
    </a>
  </header>

  <main class="authShell">
    <section class="authCard" aria-label="Authentication">

      <div class="authHead">
        <div class="authEyebrow">WELCOME BACK</div>
        <h1 class="authTitle" id="mainTitle">Login to Mirah</h1>
        <p class="authSub">Enter your details to access your account.</p>
      </div>

      <!-- Google Button -->
      <button class="authBtn authBtn--google" id="btnGoogle" type="button">
        <svg class="gIcon" viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
          <g transform="matrix(1, 0, 0, 1, 27.009001, -39.238998)">
            <path fill="#4285F4" d="M -3.264 51.509 C -3.264 50.719 -3.334 49.969 -3.454 49.239 L -14.754 49.239 L -14.754 53.749 L -8.284 53.749 C -8.574 55.229 -9.424 56.479 -10.684 57.329 L -10.684 60.329 L -6.824 60.329 C -4.564 58.239 -3.264 55.159 -3.264 51.509 Z" />
            <path fill="#34A853" d="M -14.754 63.239 C -11.514 63.239 -8.804 62.159 -6.824 60.329 L -10.684 57.329 C -11.764 58.049 -13.134 58.489 -14.754 58.489 C -17.884 58.489 -20.534 56.379 -21.484 53.529 L -25.464 53.529 L -25.464 56.619 C -23.494 60.539 -19.444 63.239 -14.754 63.239 Z" />
            <path fill="#FBBC05" d="M -21.484 53.529 C -21.734 52.809 -21.864 52.039 -21.864 51.239 C -21.864 50.439 -21.724 49.669 -21.484 48.949 L -21.484 45.859 L -25.464 45.859 C -26.284 47.479 -26.754 49.299 -26.754 51.239 C -26.754 53.179 -26.284 54.999 -25.464 56.619 L -21.484 53.529 Z" />
            <path fill="#EA4335" d="M -14.754 43.989 C -12.984 43.989 -11.404 44.599 -10.154 45.789 L -6.734 42.369 C -8.804 40.429 -11.514 39.239 -14.754 39.239 C -19.444 39.239 -23.494 41.939 -25.464 45.859 L -21.484 48.949 C -20.534 46.099 -17.884 43.989 -14.754 43.989 Z" />
          </g>
        </svg>
        <span>Continue with Google</span>
      </button>

      <div class="authSep">
        <span class="authSep__line"></span>
        <span class="authSep__txt">or with email</span>
        <span class="authSep__line"></span>
      </div>

      <!-- Toggle Switch -->
      <div class="authSwitch" role="tablist" aria-label="Auth mode">
        <button class="authSwitch__btn is-active" id="tabLogin" type="button">Login</button>
        <button class="authSwitch__btn" id="tabSignup" type="button">Sign up</button>
      </div>

      <form class="authForm" id="authForm">
        <label class="authField">
          <span>Email Address</span>
          <div class="inputWrapper">
            <input class="authInput" id="email" type="email" placeholder="name@company.com" autocomplete="email" required />
          </div>
        </label>

        <label class="authField">
          <div class="flexBetween">
            <span>Password</span>
            <button class="authLinkBtn" id="btnForgot" type="button" tabindex="-1">Forgot?</button>
          </div>
          <div class="inputWrapper">
            <input class="authInput" id="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
          </div>
        </label>

        <!-- Dynamic Submit Button -->
        <button class="authBtn authBtn--solid" id="btnSubmit" type="submit">
          <span class="btnText">Login</span>
          <div class="btnLoader"></div> <!-- CSS Loader -->
        </button>

        <div class="authMsg" id="authMsg" aria-live="polite"></div>
      </form>

      <div class="authFoot">
        By continuing, you agree to our 
        <a href="../pages/legal/terms-&-conditions.html">Terms</a> & 
        <a href="../pages/legal/privacy-policy.html">Privacy</a>.
      </div>

    </section>
  </main>

  <!-- JS Modules -->
  
</body>
</html>
