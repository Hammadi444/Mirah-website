<!-- =========================================================
     MODERN WHATSAPP WIDGET (2025 UI + Scroll Limit)
========================================================= -->
<style>
  /* --- Widget Wrapper --- */
  .wa-widget {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 99999;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 12px;
  }

  /* --- 1. Floating Button (Pulse & Shake) --- */
  .wa-btn {
    width: 60px;
    height: 60px;
    background: #25D366;
    border-radius: 50%;
    box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: none;
    transition: transform 0.2s ease;
    /* Shake Animation Loop */
    animation: wa-shake-loop 3s infinite;
  }

  .wa-btn:hover {
    transform: scale(1.1);
    animation: none; /* Hover par shake band */
    background: #20BD5A;
  }

  .wa-icon {
    width: 32px;
    height: 32px;
    fill: white;
  }

  @keyframes wa-shake-loop {
    0%, 85%, 100% { transform: scale(1) rotate(0deg); }
    87% { transform: scale(1.1) rotate(-3deg); }
    89% { transform: scale(1.1) rotate(3deg); }
    91% { transform: scale(1.1) rotate(-3deg); }
    93% { transform: scale(1.1) rotate(3deg); }
    95% { transform: scale(1.1) rotate(-3deg); }
    97% { transform: scale(1.1) rotate(3deg); }
  }

  /* --- 2. The Chat Box (Modern UI) --- */
  .wa-box {
    width: 350px;
    max-width: 90vw;
    background: #ffffff;
    /* ✅ Instruction Followed: 8px Border Radius for Box */
    border-radius: 8px; 
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    overflow: hidden;
    opacity: 0;
    transform: translateY(20px) scale(0.95);
    transform-origin: bottom right;
    transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
    pointer-events: none;
    position: absolute;
    bottom: 75px;
    right: 0;
    display: flex;
    flex-direction: column;
  }

  .wa-box.is-active {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: all;
  }

  /* Header (Official Dark Teal) */
  .wa-head {
    background: #008069; 
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    color: white;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  .wa-avatar {
    width: 40px;
    height: 40px;
    background: white;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
  }
  .wa-avatar img { width: 100%; height: 100%; object-fit: cover; }

  .wa-info h3 {
    margin: 0;
    font-size: 16px;
    font-weight: 600;
  }
  .wa-info p {
    margin: 2px 0 0;
    font-size: 12px;
    opacity: 0.9;
  }

  .wa-close {
    margin-left: auto;
    background: none;
    border: none;
    color: white;
    font-size: 20px;
    opacity: 0.8;
    cursor: pointer;
    padding: 4px;
  }
  .wa-close:hover { opacity: 1; }

  /* Body (Beige Pattern) */
  .wa-body {
    background-color: #EFEAE2;
    background-image: url("https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png");
    background-size: 350px;
    padding: 20px;
    min-height: 180px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  /* Message Bubble (Incoming) */
  .wa-msg-in {
    background: #FFFFFF;
    padding: 8px 12px;
    border-radius: 0px 8px 8px 8px; /* Classic WA shape */
    box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    font-size: 14px;
    line-height: 1.4;
    color: #111b21;
    max-width: 85%;
    position: relative;
    margin-bottom: 4px;
  }
  /* Tiny tail for bubble */
  .wa-msg-in::before {
    content: "";
    position: absolute;
    left: -8px; top: 0;
    width: 0; height: 0;
    border: 8px solid transparent;
    border-top-color: #FFFFFF;
    border-right-color: #FFFFFF; /* smooth join */
  }

  .wa-time {
    float: right;
    margin-left: 8px;
    margin-top: 6px;
    font-size: 10px;
    color: #667781;
  }

  /* Footer (Input Area) */
  .wa-foot {
    background: #F0F2F5;
    padding: 8px 10px;
    display: flex;
    align-items: flex-end; /* Keeps button at bottom if text grows */
    gap: 8px;
  }

  /* --- ✅ INPUT FIX: 5 Lines + Scroll --- */
  .wa-input {
    flex: 1;
    background: #FFFFFF;
    border: 1px solid white;
    border-radius: 24px; /* Pill shape (Modern WA style) */
    padding: 9px 16px;
    font-size: 15px;
    font-family: inherit;
    line-height: 20px; /* ~20px per line */
    resize: none; /* User cant drag resize */
    outline: none;
    
    /* 5 Lines Logic: 20px * 6 = 120px max height */
    max-height: 120px; 
    overflow-y: auto; /* Scrollbar appears if taller */
  }

  .wa-input:focus {
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05);
  }

  /* Custom Thin Scrollbar for Input */
  .wa-input::-webkit-scrollbar { width: 4px; }
  .wa-input::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
  .wa-input::-webkit-scrollbar-track { background: transparent; }

  /* Send Button */
  .wa-send {
    width: 40px;
    height: 40px;
    background: none;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #008069;
    transition: 0.2s;
    padding-bottom: 2px;
  }
  .wa-send:hover {
    background: rgba(0,0,0,0.05);
    border-radius: 50%;
  }
  .wa-send svg { width: 24px; height: 24px; fill: currentColor; }

</style>

<div class="wa-widget" id="waWidget">

  <!-- Chat Card -->
  <div class="wa-box" id="waBox" role="dialog" aria-hidden="true">
    <!-- Header -->
    <div class="wa-head">
      <div class="wa-avatar">
        <!-- Logo -->
        <img src="/public/icons/MirahLogo.jpg" alt="Mirah Tools" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/1/18/WhatsApp_logo_1.png'">
      </div>
      <div class="wa-info">
        <h3>Mirah Tools</h3>
        <p>Typically replies instantly</p>
      </div>
      <button class="wa-close" id="waClose" aria-label="Close">✕</button>
    </div>

    <!-- Chat History -->
    <div class="wa-body">
      <div class="wa-msg-in">
        <strong>Hello! 👋</strong><br>
        How can we help you with Mirah Tools today?
        <span class="wa-time">10:00 AM</span>
      </div>
    </div>

    <!-- Footer Input -->
    <div class="wa-foot">
      <!-- 
         max-height: 120px defined in CSS handles the 5-line limit 
      -->
      <textarea class="wa-input" id="waInput" rows="1" placeholder="Type a message..."></textarea>
      
      <button class="wa-send" id="waSend" aria-label="Send">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
      </button>
    </div>
  </div>

  <!-- Main Floating Button -->
  <button class="wa-btn" id="waBtn" aria-label="Open WhatsApp Chat">
    <svg class="wa-icon" viewBox="0 0 24 24">
      <path d="M12.04 2c-5.46 0-9.91 4.45-9.91 9.91 0 1.75.46 3.45 1.32 4.95L2.05 22l5.25-1.38c1.45.79 3.08 1.21 4.74 1.21 5.46 0 9.91-4.45 9.91-9.91 0-2.65-1.03-5.14-2.9-7.01C17.18 3.03 14.69 2 12.04 2zM12.05 19.81c-1.48 0-2.93-.4-4.21-1.15l-.3-.18-3.12.82.83-3.04-.19-.31a7.73 7.73 0 0 1-1.25-4.14c0-4.27 3.47-7.74 7.74-7.74 2.07 0 4.02.81 5.48 2.27 1.47 1.46 2.27 3.41 2.27 5.48 0 4.27-3.47 7.74-7.75 7.74zm4.24-5.8c-.23-.11-1.36-.67-1.57-.75-.21-.08-.36-.12-.51.11-.15.23-.59.75-.72.9-.13.15-.27.17-.5.06-.23-.11-.97-.36-1.85-1.14-.68-.61-1.14-1.36-1.27-1.59-.13-.23-.01-.35.1-.46.1-.1.23-.27.35-.4.11-.13.15-.23.23-.38.08-.15.04-.29-.02-.4-.06-.11-.51-1.24-.7-1.69-.19-.45-.38-.39-.52-.39h-.44c-.15 0-.4.06-.61.29-.21.23-.8.78-.8 1.9s.82 2.21.94 2.37c.11.16 1.61 2.46 3.91 3.45.55.23.97.37 1.3.48.54.17 1.04.15 1.43.09.43-.07 1.36-.56 1.55-1.09.19-.53.19-.99.13-1.09-.05-.1-.19-.15-.42-.27z"/>
    </svg>
  </button>

</div>
